<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Churn Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }


        body{

            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );

            padding:40px;

        }


        .container{

            max-width:1200px;

            margin:auto;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(15px);

            border-radius:25px;

            padding:35px;

            box-shadow:
            0 20px 40px rgba(0,0,0,0.2);

        }


        h1{

            text-align:center;

            color:white;

            margin-bottom:10px;

            font-size:35px;

        }


        .subtitle{

            text-align:center;

            color:#eee;

            margin-bottom:35px;

        }



        .form-grid{

            display:grid;

            grid-template-columns:
            repeat(2,1fr);

            gap:25px;

        }



        .field{

            display:flex;

            flex-direction:column;

        }



        label{

            color:white;

            font-weight:600;

            margin-bottom:8px;

            font-size:15px;

        }



        input,
        select{

            padding:12px;

            border-radius:12px;

            border:none;

            outline:none;

            font-size:15px;

            background:white;

        }



        input:focus,
        select:focus{

            box-shadow:
            0 0 10px #ffffff;

        }



        .buttons{

            margin-top:35px;

            text-align:center;

        }



        button{

            padding:14px 40px;

            border:none;

            border-radius:30px;

            background:#ff7eb3;

            color:white;

            font-size:17px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

        }



        button:hover{

            transform:scale(1.05);

            background:#ff4f9a;

        }



        .reset{

            margin-left:15px;

            background:#555;

        }


        .result{

            margin-top:30px;

            padding:20px;

            border-radius:15px;

            background:white;

            text-align:center;

            font-size:22px;

            font-weight:bold;

            color:#333;

        }



        @media(max-width:800px){

            .form-grid{

                grid-template-columns:1fr;

            }


            body{

                padding:15px;

            }

        }


    </style>

</head>



<body>


<div class="container">


<h1>
    Customer Churn Prediction
</h1>


<p class="subtitle">
    Enter customer details to predict whether the customer will churn or stay
</p>



<form action="/" method="POST">


<div class="form-grid">



<div class="field">

<label>Customer ID</label>

<input 
type="text"
name="customerID"
placeholder="Enter customer ID">

</div>



<div class="field">

<label>Gender</label>

<select name="gender">

<option>Male</option>
<option>Female</option>

</select>

</div>




<div class="field">

<label>Senior Citizen</label>

<select name="SeniorCitizen">

<option value="0">No</option>
<option value="1">Yes</option>

</select>

</div>




<div class="field">

<label>Partner</label>

<select name="Partner">

<option>Yes</option>
<option>No</option>

</select>

</div>



<div class="field">

<label>Dependents</label>

<select name="Dependents">

<option>Yes</option>
<option>No</option>

</select>

</div>



<div class="field">

<label>Tenure (Months)</label>

<input 
type="number"
name="tenure"
placeholder="Enter tenure">

</div>



<div class="field">

<label>Phone Service</label>

<select name="PhoneService">

<option>Yes</option>
<option>No</option>

</select>

</div>




<div class="field">

<label>Multiple Lines</label>

<select name="MultipleLines">

<option>Yes</option>
<option>No</option>
<option>No phone service</option>

</select>

</div>



<div class="field">

<label>Internet Service</label>

<select name="InternetService">

<option>DSL</option>
<option>Fiber optic</option>
<option>No</option>

</select>

</div>




<div class="field">

<label>Online Security</label>

<select name="OnlineSecurity">

<option>Yes</option>
<option>No</option>
<option>No internet service</option>

</select>

</div>



<div class="field">

<label>Online Backup</label>

<select name="OnlineBackup">

<option>Yes</option>
<option>No</option>
<option>No internet service</option>

</select>

</div>




<div class="field">

<label>Device Protection</label>

<select name="DeviceProtection">

<option>Yes</option>
<option>No</option>
<option>No internet service</option>

</select>

</div>



<div class="field">

<label>Tech Support</label>

<select name="TechSupport">

<option>Yes</option>
<option>No</option>
<option>No internet service</option>

</select>

</div>



<div class="field">

<label>Streaming TV</label>

<select name="StreamingTV">

<option>Yes</option>
<option>No</option>
<option>No internet service</option>

</select>

</div>



<div class="field">

<label>Streaming Movies</label>

<select name="StreamingMovies">

<option>Yes</option>
<option>No</option>
<option>No internet service</option>

</select>

</div>




<div class="field">

<label>Contract</label>

<select name="Contract">

<option>Month-to-month</option>
<option>One year</option>
<option>Two year</option>

</select>

</div>




<div class="field">

<label>Paperless Billing</label>

<select name="PaperlessBilling">

<option>Yes</option>
<option>No</option>

</select>

</div>



<div class="field">

<label>Payment Method</label>

<select name="PaymentMethod">

<option>
Electronic check
</option>

<option>
Mailed check
</option>

<option>
Bank transfer
</option>

<option>
Credit card
</option>


</select>

</div>




<div class="field">

<label>Monthly Charges</label>

<input
type="number"
step="0.01"
name="MonthlyCharges">

</div>




<div class="field">

<label>Total Charges</label>

<input
type="number"
step="0.01"
name="TotalCharges">

</div>



</div>



<div class="buttons">


<button type="submit">
Predict Churn
</button>



<button 
type="reset"
class="reset">

Clear

</button>


</div>



</form>



{% if prediction %}

<div class="result">

{{ prediction }}

</div>

{% endif %}



</div>


</body>

</html>
